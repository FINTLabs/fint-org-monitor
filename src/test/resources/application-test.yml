fint:
  orgmonitor:
    serviceaccount: serviceaccount.json
    gmail:
      delegate: asgeir@fintlabs.no
    application-name: Test
    recipients: asgeir@fintlabs.no
    sender: asgeir@fintlabs.no
    orgid: fintlabs.no
    cron: "*/30 * * * * *"
  security:
    oauth2:
      clients:
        fint-core:
          token-uri: "https://example.com"
          client-id: 1234456789
          client-secret: secret
          authorization-grant-type: client_credentials
  core:
    idp:
      url: "https://example.com"
      oauth-client: "fint-core"
  oauth:
    enabled: false
  sync:
    enabled: false # make sure UpdateRunner do not run when testing.z



logging:
  level:
    no.fint: DEBUG