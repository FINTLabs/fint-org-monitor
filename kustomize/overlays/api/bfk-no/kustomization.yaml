apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bfk-no
resources:
  - ../../../base
labels:
  - pairs:
      app.kubernetes.io/name: fint-org-monitor
      app.kubernetes.io/instance: fint-org-monitor_bfk_no
      app.kubernetes.io/version: latest
      app.kubernetes.io/component: backend
      app.kubernetes.io/part-of: fint-core
      fintlabs.no/team: core
      fintlabs.no/org-id: bfk.no
patches:
  - patch: |-
      apiVersion: fintlabs.no/v1alpha1
      kind: Application
      metadata:
        name: fint-org-monitor
        labels:
          app.kubernetes.io/instance: fint-org-monitor_bfk_no
      spec:
        orgId: bfk.no
        env:
          - name: fint.environment
            value: api
          - name: fint.orgmonitor.sender
            value: drift@vigoiks.no
          - name: fint.orgmonitor.recipients
            value: "integrasjoner.elements@bfk.no, olegia@bfk.no, birgerbra@frid-iks.no, digitale.skjema@frid-iks.no"
    target:
      kind: Application
      name: fint-org-monitor

  - patch: |-
      apiVersion: fintlabs.no/v1alpha1
      kind: FintClient
      metadata:
        name: fint-org-monitor-client
        labels:
          app.kubernetes.io/instance: fint-org-monitor-client_bfk_no
      spec:
        orgId: bfk.no
    target:
      kind: FintClient
      name: fint-org-monitor-client